<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PWA Install Test</title>
    <meta name="description" content="A minimal one-page PWA to test the install-to-home-screen flow." />

    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#4f46e5" />

    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PWA Test" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app">
      <section class="page is-active" data-page="home">
        <h1 class="page-title">Home</h1>
      </section>
      <section class="page" data-page="search">
        <h1 class="page-title">Search</h1>
      </section>
      <section class="page" data-page="library">
        <h1 class="page-title">Library</h1>
      </section>
      <section class="page" data-page="profile">
        <h1 class="page-title">Profile</h1>
      </section>
    </main>

    <nav class="bottom-nav" role="tablist" aria-label="Primary">
      <button class="tab-btn is-active" type="button" role="tab" data-tab="home" aria-label="Home">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="tab-btn" type="button" role="tab" data-tab="search" aria-label="Search">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="m20 20-3.5-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Search</span>
      </button>
      <button class="tab-btn" type="button" role="tab" data-tab="library" aria-label="Library">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="M6 4h12a1 1 0 0 1 1 1v15l-7-3-7 3V5a1 1 0 0 1 1-1z"/>
        </svg>
        <span>Library</span>
      </button>
      <button class="tab-btn" type="button" role="tab" data-tab="profile" aria-label="Profile">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M4 21a8 8 0 0 1 16 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Profile</span>
      </button>
    </nav>

    <button
      id="install-btn"
      class="fab"
      type="button"
      aria-label="Install app"
      hidden
    >
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path
          fill="currentColor"
          d="M12 3a1 1 0 0 1 1 1v9.586l3.293-3.293a1 1 0 1 1 1.414 1.414l-5 5a1 1 0 0 1-1.414 0l-5-5a1 1 0 1 1 1.414-1.414L11 13.586V4a1 1 0 0 1 1-1Zm-7 16a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1Z"
        />
      </svg>
      <span>Install app</span>
    </button>

    <div id="ios-modal" class="modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">Install on iPhone / iPad</h2>
        <ol>
          <li>
            Tap the <strong>Share</strong> button
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" class="inline-icon">
              <path fill="currentColor" d="M12 3a1 1 0 0 1 .7.29l3.5 3.5a1 1 0 1 1-1.4 1.42L13 6.41V15a1 1 0 1 1-2 0V6.41L9.21 8.21a1 1 0 1 1-1.42-1.42l3.5-3.5A1 1 0 0 1 12 3Zm-7 9a1 1 0 0 1 1 1v6h12v-6a1 1 0 1 1 2 0v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6a1 1 0 0 1 1-1Z"/>
            </svg>
            in the Safari toolbar.
          </li>
          <li>Scroll and tap <strong>Add to Home Screen</strong>.</li>
          <li>Tap <strong>Add</strong> in the top-right corner.</li>
        </ol>
        <button id="modal-close" type="button" class="btn-secondary">Got it</button>
      </div>
    </div>

    <div id="toast" class="toast" hidden>Installed!</div>

    <script src="app.js"></script>
  </body>
</html>
